<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remedia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Top nav -->
  <header class="site-header">
    <h1 class="site-logo" id="site-logo">REMEDIA</h1>
    <button class="btn btn-primary" id="header-action-btn">+ New Collection</button>
  </header>

  <!-- Main view mount point -->
  <main id="app"></main>

  <!-- Modal container (shared by all modals) -->
  <div class="modal-overlay hidden" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal" id="modal">
      <!-- content injected by JS -->
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/main.js"></script>
</body>

</html>
